name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: generate_notes
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          PREV_VERSION=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null)
          echo "PREV_VERSION=$PREV_VERSION"
          if [ -z "$PREV_VERSION" ]; then
            echo "没有找到前一个标签，使用所有提交历史"
            CHANGES=$(git log --pretty=format:"- %s" -20)
          else
            echo "找到前一个标签: $PREV_VERSION"
            CHANGES=$(git log --pretty=format:"- %s" ${PREV_VERSION}..HEAD)
          fi
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "## 版本 $VERSION 更新内容" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "---" >> $GITHUB_OUTPUT
          echo "*此release由GitHub Actions自动创建*" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
          release_name: ${{ steps.get_version.outputs.VERSION }}
          body: ${{ steps.generate_notes.outputs.CHANGES }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}